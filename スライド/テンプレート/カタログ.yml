templates:
  - id: isometric-corporate-clean
    name: Isometric Corporate Clean
    source_file: スライド/テンプレート/アイソメトリック法人向けクリーン.md
    style_tags:
      - isometric
      - corporate
      - screenshot-compatible
      - official-logo-compatible
      - white-background
      - navy-teal
      - card-layout
