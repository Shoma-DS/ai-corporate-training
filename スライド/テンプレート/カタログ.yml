templates:
  - id: isometric-corporate-clean
    name: Isometric Corporate Clean
    source_file: スライド/テンプレート/アイソメトリック法人向けクリーン.md
    style_tags:
      - isometric
      - corporate
      - screenshot-compatible
      - official-logo-compatible
      - white-background
      - navy-teal
      - card-layout
      - dx-ai-training
    best_for:
      - 法人研修の講座紹介資料
      - DX、AX、生成AI、データ活用、業務効率化の研修資料
      - 業務フロー、学習ロードマップ、運用設計、成果物を整理する資料
      - 公式ロゴやスクリーンショットと図解を併用するサービス紹介資料
      - 初心者から中級者までに向けた実務的で清潔な印象のスライド
    avoid_for:
      - 写真中心の事例紹介資料
      - 強い情緒訴求やブランド広告色の強い資料
      - 黒背景、派手なグラデーション、イベント告知風の資料
      - 画像生成AIだけで実在ロゴや実在サービス画面を再現するスライド
    default_slide_mapping:
      title_and_tagline: scene-environment
      training_purpose: hierarchy-pyramid
      common_pain_points: network-relationship
      solution_overview: process-flow
      after_training_capabilities: module-block
      training_strengths: module-block
      audience_and_prerequisites: persona-audience
      delivery_time_management: structure-layer
      curriculum_table: roadmap-timeline
      exercises_deliverables_takeaway: process-flow
      cautions_application_operations: governance-risk
    diagram_patterns:
      - id: process-flow
        name: プロセス・フロー型
      - id: hierarchy-pyramid
        name: 階層・ピラミッド型
      - id: structure-layer
        name: 構造・レイヤー型
      - id: comparison-contrast
        name: 比較・対比型
      - id: network-relationship
        name: ネットワーク・関係性型
      - id: scene-environment
        name: シーン・環境表現型
      - id: data-insight
        name: データ・インサイト型
      - id: module-block
        name: モジュール・ブロック型
      - id: roadmap-timeline
        name: ロードマップ・タイムライン型
      - id: before-after-transformation
        name: Before/After・変革型
      - id: funnel-selection
        name: ファネル・選定型
      - id: matrix-classification
        name: マトリクス・分類型
      - id: continuous-operation-loop
        name: ループ・継続運用型
      - id: governance-risk
        name: ガバナンス・リスク管理型
      - id: persona-audience
        name: ペルソナ・対象者型
      - id: checklist-confirmation
        name: チェックリスト・確認型
  - id: soft-isometric-corporate-warm
    name: Soft Isometric Corporate Warm
    source_file: スライド/テンプレート/ソフトアイソメトリック法人向けウォーム.md
    style_tags:
      - soft-isometric
      - corporate
      - warm
      - rounded-card-layout
      - friendly-people
      - screenshot-compatible
      - official-logo-compatible
      - white-background
      - navy-blue
      - risk-and-permission-training
    best_for:
      - 権限設計、共有範囲、共同編集、情報管理をやさしく説明する研修スライド
      - Google Drive、フォーム、スプレッドシートなどの操作前後に、役割や注意点を整理する資料
      - 初心者から中級者に向けて、硬い制度・ルール・リスク確認を読みやすく伝える資料
      - 人物イラスト、角丸カード、表、チェックマーク、注意喚起を組み合わせる実務説明スライド
      - 画面共有前の導入、演習レビュー、チェックリスト、持ち帰り確認
    avoid_for:
      - 高度なシステム構成、RAG設計、データ基盤アーキテクチャを厳密に説明する資料
      - 写真中心の事例紹介資料
      - 強いブランド広告色、イベント告知風、派手なグラデーション中心の資料
      - 黒背景やサイバー感の強い資料
      - 画像生成AIだけで実在ロゴや実在サービス画面を再現するスライド
    default_slide_mapping:
      title_and_tagline: summary-takeaway
      training_purpose: soft-process-flow
      common_pain_points: before-after-cards
      solution_overview: soft-process-flow
      after_training_capabilities: checklist-review
      training_strengths: role-card-set
      audience_and_prerequisites: role-card-set
      delivery_time_management: checklist-review
      curriculum_table: soft-process-flow
      exercises_deliverables_takeaway: workshop-instruction
      cautions_application_operations: caution-risk-check
    diagram_patterns:
      - id: permission-role-matrix
        name: 権限・役割マトリクス型
      - id: collaboration-scope-check
        name: 共同編集・見せてよい範囲確認型
      - id: soft-process-flow
        name: ソフトプロセス・フロー型
      - id: role-card-set
        name: 役割カード型
      - id: caution-risk-check
        name: 注意喚起・リスク確認型
      - id: ui-mockup-comparison
        name: UIモック比較型
      - id: data-table-checkpoints
        name: データ表・確認観点型
      - id: folder-structure
        name: 保存場所・フォルダ構造型
      - id: checklist-review
        name: チェックリスト・レビュー型
      - id: before-after-cards
        name: Before/Afterカード型
      - id: workshop-instruction
        name: ワーク指示・演習導入型
      - id: summary-takeaway
        name: まとめ・持ち帰り型
      - id: screen-share-transition
        name: 画面共有案内型
