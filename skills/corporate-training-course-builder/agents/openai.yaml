interface:
  display_name: "Corporate Training Course Builder"
  short_description: "Build or revise a training session end to end, including scripts, slide images, handouts, session-specific exercise data, and public case research."
  default_prompt: "Create or update a target training session end to end from a one-phrase request such as 4回目の台本とスライド画像まで作って, or revise handouts and exercise data while checking online concrete examples and public practitioner use cases. Identify the session folder, keep course-wide materials under 全体/ and course-wide source notes under 全体/調査/, use one fixed repository slide template ID for the session, browse official sources for current facts and public examples for reusable workflow patterns, split duplicated CSV/sample data into session-specific exercise files when each session has a different learner output, keep public materials free of private details, coordinate parallel subagents when useful, reconcile outputs, then produce the outline, instructor script, slide prompts, GPT image 2 / built-in raster slide images, worksheets, handouts, exercise data, screenshots, and shared official logos."
