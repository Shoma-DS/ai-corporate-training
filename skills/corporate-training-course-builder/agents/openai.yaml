interface:
  display_name: "Corporate Training Course Builder"
  short_description: "Single entrypoint for AI法人研修 course creation, from curriculum and scripts through slide images, handouts, data, verification, and export handoff."
  default_prompt: "Use this as the single entrypoint for broad requests such as 講座作成, 講座を作成してください, 研修資料を作って, or 4回目の台本とスライド画像まで作って. Identify the course/session scope, read AGENTS.md and the unified workflow, keep course-wide materials under 全体/ and source notes under 全体/調査/, use one fixed repository slide template ID unless justified, browse official/current sources when needed, keep public materials free of private details, produce curriculum, outline, instructor script, slide prompts, GPT image 2 raster slide images, worksheets, handouts, exercise data, screenshots, and verification. Invoke gws-ai-training-slide-exporter or codex-dynamic-workflows only as downstream helpers at the relevant phase."
